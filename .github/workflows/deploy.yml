name: Deploy

on:
  push:
    branches: [master]
    paths:
      - 'src/coros_sync/**'
      - 'src/garmin_sync/**'
      - 'src/stride_core/**'
      - 'src/stride_storage/**'
      - 'src/stride_server/**'
      - 'src/coach/**'
      - 'src/plan_parser/**'
      - 'frontend/**'
      - 'strength_illustrations/**'
      - 'scripts/**'
      - 'config/**'
      - 'Dockerfile'
      - '.github/workflows/deploy.yml'
      - 'pyproject.toml'
    tags: ['v*']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/stride
  APP_NAME: stride-app
  RESOURCE_GROUP: rg-running-prod
  WORKER_NAME: stride-job-worker

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tests (pytest + lint-imports + vitest) run on every PR via
      # .github/workflows/ci.yml. Master is reached only via merged PR
      # so re-running them here would be wasted minutes — deploy.yml
      # is intentionally build-and-ship only.

      # AMap key/securityJsCode live in stride-kv-common AKV. We pull them
      # BEFORE Docker build because Vite bakes VITE_* env vars into the
      # bundle at build time — there's no runtime injection path. Domain
      # whitelist on the AMap console (set on lbs.amap.com) is what gates
      # use, not the secrecy of the key.
      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Pull AMap secrets from Key Vault
        run: |
          AMAP_KEY=$(az keyvault secret show --vault-name stride-kv-common --name amap-js-key --query value -o tsv)
          AMAP_SECURITY_CODE=$(az keyvault secret show --vault-name stride-kv-common --name amap-js-security-code --query value -o tsv)
          # Mask in workflow logs so values never surface in plain text.
          echo "::add-mask::$AMAP_KEY"
          echo "::add-mask::$AMAP_SECURITY_CODE"
          echo "AMAP_KEY=$AMAP_KEY" >> "$GITHUB_ENV"
          echo "AMAP_SECURITY_CODE=$AMAP_SECURITY_CODE" >> "$GITHUB_ENV"

      # LangSmith tracing key (runtime, test phase). The authoritative on/off
      # switch is `[observability].langsmith_enabled` in coach.prod.toml — this
      # only fetches the key the Deploy step needs WHEN that flag is true.
      # Tolerant: a missing vault secret is a no-op (the Deploy step then removes
      # any stale env), so tracing is governed by the reviewed flag, not by
      # secret presence. To make the key available, add it once:
      #   az keyvault secret set --vault-name stride-kv-common \
      #     --name langsmith-api-key --value <key>
      - name: Pull LangSmith key from Key Vault (optional)
        run: |
          LANGSMITH_API_KEY=$(az keyvault secret show --vault-name stride-kv-common \
            --name langsmith-api-key --query value -o tsv 2>/dev/null || echo "")
          if [ -n "$LANGSMITH_API_KEY" ]; then
            echo "::add-mask::$LANGSMITH_API_KEY"
            echo "LANGSMITH_API_KEY=$LANGSMITH_API_KEY" >> "$GITHUB_ENV"
            echo "LangSmith key found — prod tracing will be wired."
          else
            echo "langsmith-api-key not in Key Vault — prod tracing stays off (no-op)."
          fi

      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg VITE_AUTH_BASE_URL=${{ vars.VITE_AUTH_BASE_URL }} \
            --build-arg VITE_AUTH_CLIENT_ID=${{ vars.VITE_AUTH_CLIENT_ID }} \
            --build-arg VITE_APPLICATIONINSIGHTS_CONNECTION_STRING="${{ vars.VITE_APPLICATIONINSIGHTS_CONNECTION_STRING }}" \
            --build-arg VITE_AMAP_KEY="$AMAP_KEY" \
            --build-arg VITE_AMAP_SECURITY_CODE="$AMAP_SECURITY_CODE" \
            -t ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }} \
            -t ${{ env.GHCR_IMAGE }}:latest \
            .
          docker push ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }}
          docker push ${{ env.GHCR_IMAGE }}:latest

      - name: Deploy to Container Apps
        run: |
          # `[observability].langsmith_enabled` in coach.prod.toml is the SINGLE
          # authoritative tracing switch (the runtime forces LANGSMITH_TRACING
          # off when it's false, regardless of any env). The deploy mirrors it so
          # the flag is the gate end-to-end:
          #   enabled=true  + key present → register secret, set LANGSMITH_API_KEY
          #   otherwise                   → REMOVE the env so a prior wiring can't
          #                                 strand and keep tracing on.
          # Secret presence alone never flips tracing; only the reviewed flag does.
          if grep -Eiq '^[[:space:]]*langsmith_enabled[[:space:]]*=[[:space:]]*true' config/coach.prod.toml \
             && [ -n "${LANGSMITH_API_KEY:-}" ]; then
            az containerapp secret set \
              --name ${{ env.APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --secrets langsmith-api-key="$LANGSMITH_API_KEY" >/dev/null
            az containerapp update \
              --name ${{ env.APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }} \
              --min-replicas 1 \
              --max-replicas 1 \
              --set-env-vars STRIDE_CONFIG_ENV=prod LANGSMITH_API_KEY=secretref:langsmith-api-key
          else
            az containerapp update \
              --name ${{ env.APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }} \
              --min-replicas 1 \
              --max-replicas 1 \
              --set-env-vars STRIDE_CONFIG_ENV=prod \
              --remove-env-vars LANGSMITH_API_KEY
          fi

      - name: Update plan-reminder cron job image
        # Pinned to the same image tag as stride-app so the daily cron
        # always runs the version that wrote the data it queries.
        # continue-on-error so a missing job (first deploy / temporary
        # outage) doesn't block the main app deploy.
        continue-on-error: true
        run: |
          az containerapp job update \
            --name stride-plan-reminder \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }}

      - name: Deploy async-job worker
        # Same image as stride-app, different command: runs the queue-consumer
        # worker (the `stride-job-worker` console script) instead of uvicorn. Separate
        # Container App (ingress disabled, min=max=1) so long-running jobs never
        # contend with the API's CPU/memory.
        #
        # NOT continue-on-error: a silently-failed worker deploy means jobs
        # enqueue but nothing consumes them. We only skip when the worker app
        # doesn't exist yet (legitimate first-deploy) — every other failure
        # (bad command, permissions, crash-loop on boot) fails the deploy loudly.
        #
        # The worker MUST carry the same watch-credential Key Vault env as
        # stride-app: onboarding_full_sync reads the user's COROS/Garmin creds,
        # which prod stores in Key Vault (coros-config-{uuid}). Without these the
        # worker falls back to the file backend, finds no creds, and every
        # onboarding sync fails "not logged in to watch provider".
        run: |
          set -e
          if ! az containerapp show \
              --name ${{ env.WORKER_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} >/dev/null 2>&1; then
            echo "::error::${{ env.WORKER_NAME }} does not exist — training-load rollout requires an active worker."
            exit 1
          fi

          # The worker writes user SQLite databases during onboarding sync.
          # It must share the same Azure Files mount as stride-app, otherwise
          # progress notifications advance while the API keeps reading an
          # empty /app/data volume.
          WORKER_DATA_MOUNT=$(az containerapp show \
            --name ${{ env.WORKER_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.template.containers[0].volumeMounts[?mountPath=='/app/data'].volumeName | [0]" \
            -o tsv)
          WORKER_DATA_VOLUME=$(az containerapp show \
            --name ${{ env.WORKER_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.template.volumes[?name=='$WORKER_DATA_MOUNT' && storageName=='stridestorage' && storageType=='AzureFile'] | [0].name" \
            -o tsv)
          if [ -z "$WORKER_DATA_MOUNT" ] || [ -z "$WORKER_DATA_VOLUME" ]; then
            echo "::error::${{ env.WORKER_NAME }} must mount Azure Files storage 'stridestorage' at /app/data before deploy."
            exit 1
          fi

          az containerapp update \
            --name ${{ env.WORKER_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }} \
            --min-replicas 1 \
            --max-replicas 1 \
            --command "stride-job-worker" \
            --set-env-vars STRIDE_CONFIG_ENV=prod \
              STRIDE_COROS_KEYVAULT_URL=https://stride-kv-common.vault.azure.net/ \
              STRIDE_COROS_KEYVAULT_BACKFILL_FROM_FILE=false \
              STRIDE_GARMIN_KEYVAULT_URL=https://stride-kv-common.vault.azure.net/ \
              STRIDE_GARMIN_KEYVAULT_BACKFILL_FROM_FILE=false

          # A worker has no ingress to probe, so verify the new revision reaches
          # runningState=Running (i.e. it didn't crash-loop on boot). Poll briefly.
          LATEST=$(az containerapp show \
            --name ${{ env.WORKER_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.latestRevisionName" -o tsv)
          echo "Verifying worker revision: $LATEST"
          for i in $(seq 1 20); do
            STATE=$(az containerapp revision show \
              --name ${{ env.WORKER_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --revision "$LATEST" \
              --query "properties.runningState" -o tsv 2>/dev/null || echo "Unknown")
            echo "  attempt $i: runningState=$STATE"
            case "$STATE" in
              Running|RunningAtMaxScale) echo "worker healthy"; exit 0 ;;
              Failed|Degraded) echo "::error::worker revision $LATEST is $STATE"; exit 1 ;;
            esac
            sleep 15
          done
          echo "::error::worker revision $LATEST never reached Running"
          exit 1

      - name: Health check (new revision must reach Running + serve /api/health)
        # Hitting /api/health alone is not enough: in single-revision mode
        # ACA keeps the prior revision serving when the new one fails to
        # boot, so /api/health passes against stale code and the deploy
        # reports false success. This step targets the *new* revision name
        # explicitly and fails loudly if it never reaches runningState=Running.
        run: |
          set -e
          LATEST=$(az containerapp show \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.latestRevisionName" -o tsv)
          FQDN=$(az containerapp show \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Verifying revision: $LATEST"
          echo "App URL: https://$FQDN"

          for i in $(seq 1 30); do
            STATE=$(az containerapp revision show \
              --name ${{ env.APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --revision "$LATEST" \
              --query "properties.runningState" -o tsv 2>/dev/null || echo "Unknown")
            echo "Attempt $i/30 — revision=$LATEST runningState=$STATE"

            # ACA reports several Running variants — Running / RunningAtMaxScale /
            # Scaling — all of which mean replicas are up. Match the prefix
            # rather than an exact string so we don't false-fail on scale state.
            if [[ "$STATE" == Running* ]]; then
              if curl -sf "https://$FQDN/api/health" | grep -q '"status":"ok"'; then
                echo "✓ Revision $LATEST is $STATE and /api/health=ok"
                exit 0
              fi
              echo "  revision $STATE but /api/health not yet ok — retrying"
            fi

            if [[ "$STATE" == "Failed" || "$STATE" == "Degraded" ]]; then
              echo "✗ Revision $LATEST FAILED to start — dumping logs:"
              az containerapp logs show \
                --name ${{ env.APP_NAME }} \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --revision "$LATEST" \
                --tail 100 || true
              exit 1
            fi

            sleep 10
          done

          echo "✗ Revision $LATEST never reached Running after 5 minutes — dumping logs:"
          az containerapp logs show \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --revision "$LATEST" \
            --tail 100 || true
          exit 1

      - name: Roll out current STRIDE training-load model (async enqueue + poll)
        env:
          INTERNAL_TOKEN: ${{ secrets.STRIDE_INTERNAL_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$INTERNAL_TOKEN" ]; then
            echo "::error::STRIDE_INTERNAL_TOKEN secret missing"
            exit 1
          fi

          FQDN=$(az containerapp show \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          # Enqueue one training_load_backfill job per missing user, then poll
          # each job's status endpoint to a terminal state. The old synchronous
          # backfill route scanned 365 days (~1.2M timeseries rows) inside the
          # request and 504'd past the ACA 240s budget; the async worker now does
          # the scan and this step only enqueues + polls. All jobs are enqueued
          # FIRST so a single worker's serial processing doesn't make the rollout
          # wait user-by-user.
          FQDN="$FQDN" INTERNAL_TOKEN="$INTERNAL_TOKEN" python3 <<'PY'
          import json
          import os
          import time
          import urllib.error
          import urllib.parse
          import urllib.request

          fqdn = os.environ["FQDN"]
          token = os.environ["INTERNAL_TOKEN"]
          base = f"https://{fqdn}"
          headers = {"X-Internal-Token": token, "Content-Type": "application/json"}
          POLL_TIMEOUT_S = 3600
          POLL_INTERVAL_S = 10


          def request(method, path, body=None):
              data = json.dumps(body).encode() if body is not None else None
              req = urllib.request.Request(base + path, data=data, headers=headers, method=method)
              with urllib.request.urlopen(req, timeout=60) as resp:
                  return resp.status, json.loads(resp.read().decode() or "{}")


          def fail(msg):
              print(f"::error::{msg}")
              raise SystemExit(1)


          def job_result_is_usable(body):
              raw = body.get("result_json")
              if not isinstance(raw, str) or not raw:
                  return False, "missing result_json"
              try:
                  result = json.loads(raw)
              except json.JSONDecodeError:
                  return False, "invalid result_json"
              if result.get("skipped"):
                  reason = result.get("reason")
                  if reason in {"backfill_already_complete", "no_source_data"}:
                      return True, str(reason)
                  return False, f"unexpected skip reason: {reason}"
              load = result.get("load")
              rows = load.get("daily_rows_written") if isinstance(load, dict) else None
              if not isinstance(rows, int) or rows <= 0:
                  return False, f"daily_rows_written={rows}"
              return True, f"daily_rows_written={rows}"


          try:
              status, payload = request("GET", "/internal/training-load/users")
          except urllib.error.URLError as exc:
              fail(f"could not enumerate training-load users: {exc}")
          if status != 200:
              fail(f"could not enumerate training-load users (HTTP {status})")
          users = payload.get("users")
          if not isinstance(users, list) or any(not isinstance(u, str) for u in users):
              fail("invalid response from /internal/training-load/users")

          # Enqueue everything first.
          jobs = {}  # user -> job_id
          for user in users:
              try:
                  status, body = request(
                      "POST",
                      "/internal/training-load/backfill/enqueue",
                      {"user": user, "only_if_missing": True},
                  )
              except urllib.error.URLError as exc:
                  fail(f"enqueue failed for {user}: {exc}")
              if status != 200:
                  fail(f"enqueue failed for {user} (HTTP {status})")
              if body.get("skipped"):
                  print(f"training-load model already current for {user}")
                  continue
              job_id = body.get("job_id")
              if not job_id:
                  fail(f"enqueue for {user} returned no job_id")
              jobs[user] = job_id
              print(f"enqueued training_load_backfill for {user}: {job_id}")

          if not jobs:
              print("no training-load backfill jobs to run")
              raise SystemExit(0)

          # Poll all enqueued jobs to a terminal state.
          deadline = time.time() + POLL_TIMEOUT_S
          pending = dict(jobs)
          while pending and time.time() < deadline:
              time.sleep(POLL_INTERVAL_S)
              for user, job_id in list(pending.items()):
                  encoded_user = urllib.parse.quote(user, safe="")
                  encoded_job_id = urllib.parse.quote(job_id, safe="")
                  try:
                      status, body = request(
                          "GET", f"/internal/jobs/{encoded_user}/{encoded_job_id}"
                      )
                  except urllib.error.URLError as exc:
                      print(f"poll error for {user}/{job_id}: {exc}")
                      continue
                  if status != 200 or not body.get("found"):
                      continue
                  state = body.get("status")
                  if state == "done":
                      usable, detail = job_result_is_usable(body)
                      if not usable:
                          fail(
                              f"training-load backfill produced unusable result for "
                              f"{user}/{job_id}: {detail}"
                          )
                      print(f"training-load backfill done for {user}: {detail}")
                      del pending[user]
                  elif state == "failed":
                      fail(
                          f"training-load backfill failed for {user}/{job_id}: "
                          f"{body.get('error_code')}"
                      )

          if pending:
              fail(f"training-load backfill timed out for: {sorted(pending)}")
          print("training-load rollout complete")
          PY
