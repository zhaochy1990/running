name: Deploy

on:
  push:
    branches: [master]
    paths:
      - 'src/coros_sync/**'
      - 'src/garmin_sync/**'
      - 'src/stride_core/**'
      - 'src/stride_server/**'
      - 'frontend/**'
      - 'Dockerfile'
      - '.github/workflows/deploy.yml'
      - 'pyproject.toml'
    tags: ['v*']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/stride
  APP_NAME: stride-app
  RESOURCE_GROUP: rg-running-prod

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Run frontend tests
        run: |
          cd frontend
          npm install
          npm run test

      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg VITE_AUTH_BASE_URL=${{ vars.VITE_AUTH_BASE_URL }} \
            --build-arg VITE_AUTH_CLIENT_ID=${{ vars.VITE_AUTH_CLIENT_ID }} \
            --build-arg VITE_APPLICATIONINSIGHTS_CONNECTION_STRING="${{ vars.VITE_APPLICATIONINSIGHTS_CONNECTION_STRING }}" \
            -t ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }} \
            -t ${{ env.GHCR_IMAGE }}:latest \
            .
          docker push ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }}
          docker push ${{ env.GHCR_IMAGE }}:latest

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }}

      - name: Health check
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "App URL: https://$FQDN"
          for i in $(seq 1 30); do
            if curl -sf "https://$FQDN/api/health" | grep -q '"status":"ok"'; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/30 - waiting 10s..."
            sleep 10
          done
          echo "Health check failed after 5 minutes"
          exit 1
