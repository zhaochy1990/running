name: Sync Training Data

# Required GitHub Actions secrets (configured in repo settings):
#   STRIDE_PROD_URL          — base URL of the deployed stride-app, e.g.
#                              https://stride-app.<region>.azurecontainerapps.io
#   STRIDE_INTERNAL_TOKEN    — random 32+ char string. Same value must be set on
#                              the Azure Container App as STRIDE_INTERNAL_TOKEN
#                              env var (e.g. via `az containerapp update
#                              --set-env-vars STRIDE_INTERNAL_TOKEN=...`).
# These two power the structured-plan reparse webhook (Step 4 of the
# structured-training-plan rollout). They are optional — if either secret is
# unset the reparse step skips silently and the workflow stays green.

on:
  push:
    branches: [master]
    paths:
      - 'data/*/logs/**/*.md'
      - 'data/*/logs/**/*.json'
      - 'data/*/logs/**/inbody.*'
      - 'data/*/TRAINING_PLAN.md'
      - 'data/*/status.md'
      - 'data/*/profile.json'
      - 'data/*/onboarding.json'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  sync:
    name: Sync data to Azure Files and Blob
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history to diff HEAD~1 against HEAD for changed plan.md detection.
          fetch-depth: 2

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Sync training data to Azure Files and Blob
        run: |
          ACCOUNT_KEY=$(az storage account keys list \
            --resource-group rg-common-prod \
            --account-name authstorage2026 \
            --query "[0].value" -o tsv)
          BLOB_CONTAINER=stride-data

          az storage container create \
            --account-name authstorage2026 \
            --account-key "$ACCOUNT_KEY" \
            --name "$BLOB_CONTAINER" \
            --output none

          for user_dir in data/*/; do
            user=$(basename "$user_dir")
            [ "$user" = ".omc" ] && continue

            echo "==> Syncing $user logs..."
            if [ -d "$user_dir/logs" ]; then
              # Weekly markdown (plan.md, feedback.md)
              az storage file upload-batch \
                --account-name authstorage2026 \
                --account-key "$ACCOUNT_KEY" \
                --destination stride-data \
                --destination-path "$user/logs" \
                --source "$user_dir/logs" \
                --pattern "*.md" \
                --output none
              az storage blob upload-batch \
                --account-name authstorage2026 \
                --account-key "$ACCOUNT_KEY" \
                --destination "$BLOB_CONTAINER" \
                --destination-path "users/$user/logs" \
                --source "$user_dir/logs" \
                --pattern "*.md" \
                --overwrite \
                --output none

              # Structured weekly plan (plan.json) — Phase 2 of plan-json-canonical:
              # paired with plan.md so the server can prefer authored JSON over
              # LLM reparse. Upload order plan.json -> plan.md keeps the webhook
              # from racing on a stale JSON / fresh MD pair.
              az storage file upload-batch \
                --account-name authstorage2026 \
                --account-key "$ACCOUNT_KEY" \
                --destination stride-data \
                --destination-path "$user/logs" \
                --source "$user_dir/logs" \
                --pattern "*.json" \
                --output none
              az storage blob upload-batch \
                --account-name authstorage2026 \
                --account-key "$ACCOUNT_KEY" \
                --destination "$BLOB_CONTAINER" \
                --destination-path "users/$user/logs" \
                --source "$user_dir/logs" \
                --pattern "*.json" \
                --overwrite \
                --output none

              # InBody photos (inbody.jpg / .jpeg / .png per week folder)
              az storage file upload-batch \
                --account-name authstorage2026 \
                --account-key "$ACCOUNT_KEY" \
                --destination stride-data \
                --destination-path "$user/logs" \
                --source "$user_dir/logs" \
                --pattern "*/inbody.*" \
                --output none
              az storage blob upload-batch \
                --account-name authstorage2026 \
                --account-key "$ACCOUNT_KEY" \
                --destination "$BLOB_CONTAINER" \
                --destination-path "users/$user/logs" \
                --source "$user_dir/logs" \
                --pattern "*/inbody.*" \
                --overwrite \
                --output none
            fi

            # Sync TRAINING_PLAN.md if exists
            if [ -f "$user_dir/TRAINING_PLAN.md" ]; then
              az storage file upload \
                --account-name authstorage2026 \
                --account-key "$ACCOUNT_KEY" \
                --share-name stride-data \
                --source "$user_dir/TRAINING_PLAN.md" \
                --path "$user/TRAINING_PLAN.md" \
                --output none
              az storage blob upload \
                --account-name authstorage2026 \
                --account-key "$ACCOUNT_KEY" \
                --container-name "$BLOB_CONTAINER" \
                --file "$user_dir/TRAINING_PLAN.md" \
                --name "users/$user/TRAINING_PLAN.md" \
                --overwrite \
                --output none
            fi

            # Sync status.md if exists
            if [ -f "$user_dir/status.md" ]; then
              az storage file upload \
                --account-name authstorage2026 \
                --account-key "$ACCOUNT_KEY" \
                --share-name stride-data \
                --source "$user_dir/status.md" \
                --path "$user/status.md" \
                --output none
              az storage blob upload \
                --account-name authstorage2026 \
                --account-key "$ACCOUNT_KEY" \
                --container-name "$BLOB_CONTAINER" \
                --file "$user_dir/status.md" \
                --name "users/$user/status.md" \
                --overwrite \
                --output none
            fi

            # Sync profile.json (athlete profile, fed to AOAI prompt)
            if [ -f "$user_dir/profile.json" ]; then
              az storage file upload \
                --account-name authstorage2026 \
                --account-key "$ACCOUNT_KEY" \
                --share-name stride-data \
                --source "$user_dir/profile.json" \
                --path "$user/profile.json" \
                --output none
              az storage blob upload \
                --account-name authstorage2026 \
                --account-key "$ACCOUNT_KEY" \
                --container-name "$BLOB_CONTAINER" \
                --file "$user_dir/profile.json" \
                --name "users/$user/profile.json" \
                --overwrite \
                --output none
            fi

            # Sync onboarding.json if exists
            if [ -f "$user_dir/onboarding.json" ]; then
              az storage file upload \
                --account-name authstorage2026 \
                --account-key "$ACCOUNT_KEY" \
                --share-name stride-data \
                --source "$user_dir/onboarding.json" \
                --path "$user/onboarding.json" \
                --output none
              az storage blob upload \
                --account-name authstorage2026 \
                --account-key "$ACCOUNT_KEY" \
                --container-name "$BLOB_CONTAINER" \
                --file "$user_dir/onboarding.json" \
                --name "users/$user/onboarding.json" \
                --overwrite \
                --output none
            fi
          done

          echo "==> Data sync complete"

      - name: Trigger structured-plan reparse for changed plan.md files
        # Best-effort: never fails the workflow. The structured layer is a
        # derived cache — markdown is canonical and reaches prod via the
        # storage upload step above regardless of webhook outcome.
        continue-on-error: true
        env:
          STRIDE_PROD_URL: ${{ secrets.STRIDE_PROD_URL }}
          STRIDE_INTERNAL_TOKEN: ${{ secrets.STRIDE_INTERNAL_TOKEN }}
        run: |
          if [ -z "$STRIDE_PROD_URL" ] || [ -z "$STRIDE_INTERNAL_TOKEN" ]; then
            echo "STRIDE_PROD_URL or STRIDE_INTERNAL_TOKEN not configured — skipping reparse webhook"
            echo "## structured-plan reparse" >> "$GITHUB_STEP_SUMMARY"
            echo "_skipped: STRIDE_PROD_URL or STRIDE_INTERNAL_TOKEN not configured in repo secrets._" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Diff against the previous commit to find which plan.md files
          # actually changed. workflow_dispatch / first-push fall back to
          # HEAD only — list will be empty, step is a no-op.
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            # core.quotepath=false: keep non-ASCII paths unquoted so the
            # grep regex matches Chinese folder names like
            # "2026-05-04_05-10(W2基础重建)" — without this flag git outputs
            # them as `"data/.../W2\345\237\272...)/plan.md"` (quoted +
            # octal-escaped) and the regex's `^data/` anchor fails.
            CHANGED=$(git -c core.quotepath=false diff --name-only HEAD~1 HEAD | grep -E '^data/[^/]+/logs/[^/]+/plan\.(md|json)$' || true)
          else
            CHANGED=""
          fi

          if [ -z "$CHANGED" ]; then
            echo "No plan.md changes — nothing to reparse"
            echo "## structured-plan reparse" >> "$GITHUB_STEP_SUMMARY"
            echo "_no plan.md changes in this push._" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "## structured-plan reparse" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| user | folder | http | source | response |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|------|--------|----------|" >> "$GITHUB_STEP_SUMMARY"

          while IFS= read -r path; do
            # path is like  data/<user>/logs/<folder>/plan.md
            user=$(echo "$path" | awk -F/ '{print $2}')
            folder=$(echo "$path" | awk -F/ '{print $4}')
            user_enc=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$user")
            folder_enc=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$folder")

            echo "==> POST /internal/plan/reparse user=$user folder=$folder"
            response=$(curl -sS -o /tmp/reparse.body -w "%{http_code}" \
              -X POST \
              -H "X-Internal-Token: $STRIDE_INTERNAL_TOKEN" \
              "$STRIDE_PROD_URL/internal/plan/reparse?user=$user_enc&folder=$folder_enc" || echo "000")
            body=$(head -c 500 /tmp/reparse.body | tr '\n' ' ')
            source_field=$(echo "$body" | python3 -c "import sys,json; d=json.loads(sys.stdin.read() or '{}'); print(d.get('source','-'))" 2>/dev/null || echo "-")
            echo "  status=$response body=$body"
            echo "| $user | $folder | $response | $source_field | $body |" >> "$GITHUB_STEP_SUMMARY"
          done <<< "$CHANGED"
