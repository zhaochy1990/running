name: Weekly running calibration recompute

# Required GitHub Actions secrets (configured in repo settings):
#   STRIDE_PROD_URL           — base URL of the deployed stride-app, e.g.
#                               https://stride-app.<region>.azurecontainerapps.io
#   STRIDE_INTERNAL_TOKEN     — random 32+ char string. Same value must be set
#                               on the Azure Container App as STRIDE_INTERNAL_TOKEN
#                               env var.
# If either secret is unset the workflow fails so the omission is visible.

on:
  schedule:
    # Every Sunday at 04:00 UTC = 12:00 Asia/Shanghai
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: "refresh = update calibration snapshot only (weekly default); backfill = recompute daily/activity training-load too (heavier, used after schema migrations)"
        required: true
        type: choice
        default: refresh
        options:
          - refresh
          - backfill

jobs:
  recompute:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build user UUID list from data/.slug_aliases.json
        id: users
        run: |
          if [ ! -f data/.slug_aliases.json ]; then
            echo "No data/.slug_aliases.json found — nothing to recompute"
            : > users.txt
            echo "count=0" >> "$GITHUB_OUTPUT"
          else
            python3 -c "
          import json
          aliases = json.load(open('data/.slug_aliases.json'))
          uuids = sorted(set(str(v) for v in aliases.values()))
          print('\n'.join(uuids))
          " > users.txt
            count=$(wc -l < users.txt | tr -d ' ')
            echo "count=$count" >> "$GITHUB_OUTPUT"
            echo "Found $count user(s):"
            cat users.txt
          fi

      - name: Recompute running calibration per user
        if: steps.users.outputs.count != '0'
        env:
          STRIDE_PROD_URL: ${{ secrets.STRIDE_PROD_URL }}
          INTERNAL_TOKEN: ${{ secrets.STRIDE_INTERNAL_TOKEN }}
          # `mode` is only set for workflow_dispatch. Cron runs default to refresh.
          MODE: ${{ inputs.mode || 'refresh' }}
        run: |
          set -u
          if [ -z "$STRIDE_PROD_URL" ] || [ -z "$INTERNAL_TOKEN" ]; then
            echo "::error::STRIDE_PROD_URL or STRIDE_INTERNAL_TOKEN secret missing"
            exit 1
          fi

          # A forced full backfill uses the same API-owned resumable shard
          # protocol as deploy. The first successful request restarts the user's
          # series from zero; later requests resume sync_meta progress. This
          # dedicated rollout is never delegated to the async worker.
          if [ "$MODE" = "backfill" ]; then
            python3 <<'PY'
          import json
          import os
          import time
          import urllib.error
          import urllib.request

          base = os.environ["STRIDE_PROD_URL"].rstrip("/")
          token = os.environ["INTERNAL_TOKEN"]
          headers = {"X-Internal-Token": token, "Content-Type": "application/json"}
          restart_token = f"weekly:{os.environ['GITHUB_RUN_ID']}"
          MAX_RETRIES = 8
          MAX_SHARDS = 20


          def post(body):
              request = urllib.request.Request(
                  base + "/internal/training-load/backfill/step",
                  data=json.dumps(body).encode(),
                  headers=headers,
                  method="POST",
              )
              try:
                  with urllib.request.urlopen(request, timeout=220) as response:
                      return response.status, json.loads(response.read().decode() or "{}"), None
              except urllib.error.HTTPError as exc:
                  raw = exc.read().decode(errors="replace")
                  try:
                      payload = json.loads(raw or "{}")
                  except json.JSONDecodeError:
                      payload = {"detail": raw[:500]}
                  return exc.code, payload, exc.headers.get("Retry-After")


          def fail(message):
              print(f"::error::{message}")
              raise SystemExit(1)


          users = [line.strip() for line in open("users.txt", encoding="utf-8") if line.strip()]
          summary = ["## Running calibration backfill", "", "| user | result |", "|------|--------|"]
          for user in users:
              shard_count = 0
              seen_next_starts = set()
              while True:
                  if shard_count >= MAX_SHARDS:
                      fail(f"forced shard limit exceeded for {user}")
                  body = {
                      "user": user,
                      "shard_days": 30,
                      "only_if_missing": False,
                      "restart": True,
                      "restart_token": restart_token,
                  }
                  for attempt in range(1, MAX_RETRIES + 1):
                      try:
                          status, result, retry_after = post(body)
                      except urllib.error.URLError as exc:
                          status, result, retry_after = 0, {"detail": str(exc)}, None
                      if status == 200:
                          break
                      if status in (0, 503):
                          delay = min(30, int(retry_after or 2 ** min(attempt, 5)))
                          print(
                              f"retrying forced shard for {user} after status={status} "
                              f"in {delay}s ({attempt}/{MAX_RETRIES})"
                          )
                          time.sleep(delay)
                          continue
                      fail(f"forced shard failed for {user} (HTTP {status}): {result}")
                  else:
                      fail(f"forced shard retries exhausted for {user}")

                  shard = result.get("shard")
                  if shard is not None:
                      if (
                          not isinstance(shard, dict)
                          or int(shard.get("daily_rows_written") or 0) <= 0
                      ):
                          fail(f"invalid forced shard response for {user}: {result}")
                      shard_count += 1
                  if result.get("done"):
                      summary.append(f"| {user} | complete ({shard_count} shards) |")
                      print(f"forced training-load backfill complete for {user}")
                      break
                  next_start = result.get("next_shard_start")
                  if not isinstance(shard, dict) or not next_start:
                      fail(f"invalid forced shard response for {user}: {result}")
                  if next_start in seen_next_starts:
                      fail(f"forced shard cursor did not advance for {user}")
                  seen_next_starts.add(next_start)

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("\n".join(summary) + "\n")
          PY
            exit 0
          fi

          if [ "$MODE" != "refresh" ]; then
            echo "::error::unknown mode $MODE"
            exit 1
          fi
          ENDPOINT="/internal/training-load/calibration/refresh"
          TIMEOUT=240
          USER_SEP="?"

          echo "## Running calibration $MODE" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Endpoint: \`$ENDPOINT\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| user | http | response |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|----------|" >> "$GITHUB_STEP_SUMMARY"

          # POST once and echo the HTTP status. On a curl-level failure (e.g.
          # timeout exit 28, DNS, connection refused) curl returns non-zero;
          # the `|| code="000"` guard turns that into a sentinel status AND
          # makes the function exit 0, so one user's failure never aborts the
          # whole batch under GitHub Actions' default `bash -e`.
          attempt_post() {
            local code
            code=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
              --max-time "$TIMEOUT" \
              -X POST \
              -H "X-Internal-Token: $INTERNAL_TOKEN" \
              "$1") || code="000"
            echo "$code"
          }

          fail=0
          ok=0
          while read -r user; do
            [ -z "$user" ] && continue
            url="$STRIDE_PROD_URL$ENDPOINT${USER_SEP}user=$user"
            echo "==> POST $url"
            http=$(attempt_post "$url")
            # One retry on any transient failure (cold start / timeout / 5xx).
            # Cold-start of the scaled-to-zero container takes ~15s, so wait
            # long enough for it to be up before the second attempt.
            if [ "$http" != "200" ] && [ "$http" != "204" ]; then
              echo "  ↻ retrying $user (first attempt HTTP $http)"
              sleep 15
              http=$(attempt_post "$url")
            fi
            body=$(head -c 500 /tmp/resp.json | tr '\n' ' ')
            if [ "$http" = "200" ] || [ "$http" = "204" ]; then
              ok=$((ok+1))
              echo "  ✓ $user (HTTP $http)"
              echo "    response: $body"
              echo "| $user | $http | $body |" >> "$GITHUB_STEP_SUMMARY"
            else
              fail=$((fail+1))
              echo "::warning::$MODE failed for $user (HTTP $http): $body"
              echo "| $user | $http | $body |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done < users.txt

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Summary: $ok ok, $fail failed**" >> "$GITHUB_STEP_SUMMARY"
          echo "Summary: $ok ok, $fail failed"
          if [ "$fail" -gt 0 ]; then
            exit 1
          fi
