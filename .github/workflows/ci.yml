name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend (pytest + lint-imports)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          # Match Dockerfile (python:3.13-slim). Production code uses
          # 3.12+ f-string features (PEP 701) even though pyproject.toml
          # declares requires-python = ">=3.11".
          python-version: '3.13'
          cache: 'pip'

      - name: Install backend (dev extras)
        run: pip install -e ".[web,dev]"

      - name: Verify import contracts
        run: lint-imports

      - name: Run backend tests
        run: pytest -q

  frontend:
    name: Frontend (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Run frontend tests
        run: |
          cd frontend
          npm install
          npm run test
