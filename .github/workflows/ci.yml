name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend (pytest + lint-imports)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          # Match Dockerfile (python:3.13-slim). Production code uses
          # 3.12+ f-string features (PEP 701) even though pyproject.toml
          # declares requires-python = ">=3.11".
          python-version: '3.13'
          cache: 'pip'

      - name: Install backend (dev extras)
        run: pip install -e ".[web,dev]"

      - name: Verify import contracts
        run: lint-imports

      - name: Run backend tests
        run: pytest -q

  frontend:
    name: Frontend (vitest + prod build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: |
          cd frontend
          npm install

      - name: Run frontend tests
        run: |
          cd frontend
          npm run test

      # The production Dockerfile invokes `npm run build` (= `tsc -b && vite
      # build`), which applies project-reference strictness (e.g.
      # `noUnusedLocals`) that `vitest` and `tsc --noEmit` skip. Running the
      # same build here closes the gap that let PR #33 ship an unused-import
      # TS6133 error to deploy and broke prod for three back-to-back PRs.
      - name: Build frontend (matches prod Dockerfile)
        run: |
          cd frontend
          npm run build
