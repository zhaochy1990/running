# Static analysis configuration for STRIDE mobile.
# Baseline: flutter_lints (recommended for Flutter apps).
# Plus: riverpod_lint (Riverpod-specific) and a few extra strict rules.
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

  errors:
    # Treat unused imports / dead code as errors so they don't compound.
    unused_import: error
    unused_local_variable: error
    dead_code: error
    # Codegen-output Drift / Retrofit / json_serializable files generate boilerplate;
    # don't complain about them.
    invalid_annotation_target: ignore

  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.config.dart"
    - "**/generated/**"
    - "build/**"

  plugins:
    - custom_lint

linter:
  rules:
    # Style — match Vercel DESIGN.md spirit (precise, minimal)
    prefer_single_quotes: true
    require_trailing_commas: true
    prefer_const_constructors: true
    prefer_const_constructors_in_immutables: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true
    sort_constructors_first: true

    # Safety
    avoid_print: true
    avoid_dynamic_calls: true
    cancel_subscriptions: true
    close_sinks: true
    use_build_context_synchronously: true

    # Documentation — public APIs must be documented (off by default; tighten as we
    # stabilize). Leave commented for v1; revisit before v1.0 release.
    # public_member_api_docs: true
