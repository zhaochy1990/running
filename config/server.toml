# STRIDE backend runtime configuration.
# Source precedence: file layer < Azure Key Vault < environment variables.

env = "default"

[akv]
enabled = false
vault_url = ""
secret_prefix = "stride-server"

[auth]
public_key_pem = ""
public_key_path = ""
issuer = "auth-service"
audience = ""
allow_insecure_without_key = false

[auth_service]
base_url = ""
timeout_s = 5.0

# NOTE: LLM / commentary configuration intentionally lives in
# `config/coach.{toml,local.toml,prod.toml}` (loaded via
# `coach.runtime.config`). All LLM calls in the runtime — coach
# generator / reviewer / commentary / S1 master plan / S2 weekly plan /
# eval judge — go through `stride_server.coach_runtime.get_*_llm()`
# which reads coach.toml, NOT this file. Earlier `[llm]` / `[commentary]`
# blocks were dead config (legacy from the pre-PR-#16 `aoai_client`
# path) and were removed.

[storage.content]
account_url = ""
container = ""
prefix = "users"

[storage.likes]
table_account_url = ""
table_name = "stridelikes"

[storage.master_plan]
table_account_url = ""
table_name = "stridemasterplan"

# Async-job infra (queue layer + state store). Empty URLs → dev in-memory
# queue + file state store. Prod sets these to Azure Storage Queue + Table
# in server.prod.toml. Consumed by the worker (`python -m stride_server.jobs`)
# and the enqueue facade.
[storage.jobs]
queue_account_url = ""
queue_name = "stridejobs"
poison_queue_name = "stridejobs-poison"
table_account_url = ""
jobs_table_name = "stridejobs"
file_backend_dir = "data/_jobs_dev"
visibility_timeout_s = 300
poison_max_attempts = 5
stale_after_seconds = 600

[coach_persistence]
table_account_url = ""
blob_account_url = ""
checkpoints_table_name = "stridecoachcheckpoints"
checkpoint_writes_table_name = "stridecoachcheckpointwrites"
jobs_table_name = "stridecoachjobs"
weekly_versions_table_name = "strideweeklyversions"
blob_container = "coach-checkpoints"
file_backend_dir = "data/_coach_dev"
jobs_stale_after_seconds = 120

[notifications]
table_account_url = ""
devices_table = "stridedevices"
prefs_table = "strideprefs"

[notifications.jpush]
app_key = ""
master_secret = ""
url = "https://api.jpush.cn/v3/push"
timeout_s = 10.0
apns_production = true

[sync]
stale_after_seconds = 300

[internal]
token = ""

[plan]
prefer_authored_json = true
coach_agent_weekly_plan_users = ["f10bc353-01ab-4db1-af9f-d9305ea9a532"]
