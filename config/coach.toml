# Coach LLM Configuration
#
# Three roles, each backed by an independent model. Replace the
# `<PLACEHOLDER_*>` values with the actual Azure AI Foundry deployment ids
# once the resources are provisioned.
#
# Auth is Managed Identity by default. The endpoint values come from env
# vars (so the same TOML works across dev/staging/prod with different
# endpoints); secrets stay in Azure Key Vault, never in this file.

[generator]
# Coach Agent — generates weekly + master plans, drives chat with tools
provider     = "azure-openai"
model        = "gpt-5.4"
deployment   = "<PLACEHOLDER_GPT_5_4_DEPLOYMENT>"
endpoint_env = "AZURE_AI_FOUNDRY_ENDPOINT"
api_version  = "2024-10-01-preview"
temperature  = 0.4
max_tokens   = 4096
timeout_s    = 120

[reviewer]
# Reviewer Agent — critiques generator output, defends against commitment bias
provider     = "azure-ai-inference"
model        = "claude-opus-4-7"
deployment   = "<PLACEHOLDER_CLAUDE_OPUS_4_7_DEPLOYMENT>"
endpoint_env = "AZURE_AI_FOUNDRY_ENDPOINT"
api_version  = "2024-05-01-preview"
temperature  = 0.0
max_tokens   = 4096
timeout_s    = 180

[commentary]
# Activity Commentary Agent — per-activity coach commentary
# NOTE: This config is a forward-looking stub. The current production
# commentary path (auto-gen during sync + manual regenerate endpoint) still
# uses its own direct AOAI client and will be migrated in a separate commit
# so prod behavior is unchanged. Treat this section as inactive until that
# migration ships.
provider     = "azure-openai"
model        = "gpt-4.1"
deployment   = "<PLACEHOLDER_GPT_4_1_DEPLOYMENT>"
endpoint_env = "AZURE_AI_FOUNDRY_ENDPOINT"
api_version  = "2024-10-01-preview"
temperature  = 0.6
max_tokens   = 2048
timeout_s    = 90

[auth]
# Managed Identity is the only supported auth mode for prod. For local dev
# / unit tests, inject a fake LLM via coach_runtime.set_*_for_tests instead
# of switching to api-key auth.
mode = "managed-identity"
