# Coach LLM Configuration — LOCAL DEV
#
# Model properties live in [models.<key>]. Agent roles below only reference a
# model key, so switching one role is a one-line edit.
#
# DeepSeek V4 uses the official OpenAI-compatible endpoint:
#   https://api.deepseek.com
# Set the key locally before running DeepSeek-backed roles:
#   export DEEPSEEK_API_KEY=...
#
# Prod settings live in `config/coach.prod.toml`. The loader (see
# `src/coach/runtime/config.py`) resolves in this order:
#   1. `load_config(path=...)` arg
#   2. `STRIDE_COACH_CONFIG_PATH` env var
#   3. `<repo-root>/config/coach.local.toml` ← this file (developer default)
#   4. `<repo-root>/config/coach.toml`        (prod; only present after the
#                                              Docker build copies it from
#                                              `coach.prod.toml`)
#   5. `<cwd>/config/coach.toml`              (ad-hoc fallback for tests)

# ---------------------------------------------------------------------------
# Model registry
# ---------------------------------------------------------------------------

[models.deepseekv4pro]
provider = "openai-compatible"
model = "deepseek-v4-pro"
deployment = "deepseek-v4-pro"
endpoint = "https://api.deepseek.com"
api_key_env = "DEEPSEEK_API_KEY"
auth = "api-key"
api_kind = "chat-completions"
max_tokens = 4096
timeout_s = 120
reasoning_effort = "high"

[models.deepseekv4pro.extra]
thinking = { type = "enabled" }

[models.deepseekv4pro.generator]
max_tokens = 65536
timeout_s = 600
reasoning_effort = "max"

[models.deepseekv4pro.generator.extra]
# Enable only for roles/calls that require raw JSON object output.
# response_format = { type = "json_object" }

[models.deepseekv4pro.reviewer]
max_tokens = 8192
timeout_s = 300

[models.deepseekv4pro.commentary]
max_tokens = 2048
timeout_s = 120

[models.deepseekv4pro.orchestrator]
max_tokens = 4096
timeout_s = 120

[models.deepseekv4flash]
provider = "openai-compatible"
model = "deepseek-v4-flash"
deployment = "deepseek-v4-flash"
endpoint = "https://api.deepseek.com"
api_key_env = "DEEPSEEK_API_KEY"
auth = "api-key"
api_kind = "chat-completions"
max_tokens = 4096
timeout_s = 120
reasoning_effort = "high"

[models.deepseekv4flash.extra]
thinking = { type = "enabled" }

[models.deepseekv4flash.generator]
max_tokens = 65536
timeout_s = 600
reasoning_effort = "max"

[models.deepseekv4flash.generator.extra]
# Enable only for roles/calls that require raw JSON object output.
# response_format = { type = "json_object" }

[models.deepseekv4flash.reviewer]
max_tokens = 8192
timeout_s = 300

[models.deepseekv4flash.commentary]
max_tokens = 2048
timeout_s = 120

[models.deepseekv4flash.orchestrator]
max_tokens = 4096
timeout_s = 120

[models.gpt55]
provider = "azure-openai"
model = "gpt-5.5"
deployment = "gpt-5.5"
endpoint = "https://azureai4identity.cognitiveservices.azure.com"
api_version = "2025-04-01-preview"
auth = "managed-identity"
api_kind = "responses"
max_tokens = 4096
timeout_s = 180

[models.gpt55.generator]
max_tokens = 131072
timeout_s = 600

[models.gpt41]
provider = "azure-openai"
model = "gpt-4.1"
deployment = "gpt-4.1"
endpoint = "https://azureai4identity.cognitiveservices.azure.com"
api_version = "2025-04-01-preview"
auth = "managed-identity"
api_kind = "chat-completions"
temperature = 0.4
max_tokens = 2048
timeout_s = 90

[models.gpt41mini]
provider = "azure-openai"
model = "gpt-4.1-mini"
deployment = "gpt-4.1-mini"
endpoint = "https://azureai4identity.cognitiveservices.azure.com"
api_version = "2025-04-01-preview"
auth = "managed-identity"
api_kind = "chat-completions"
temperature = 0.0
max_tokens = 2048
timeout_s = 60

# ---------------------------------------------------------------------------
# Active local roles
# ---------------------------------------------------------------------------

[generator]
model = "gpt55"

[reviewer]
model = "gpt55"

[commentary]
model = "gpt55"

[orchestrator]
model = "gpt55"

[observability]
# LangSmith tracing for the test phase. ENABLED for local/CLI so coach turns
# (Resolver / specialists / Memory Writer) show up as span traces in LangSmith.
# The API key is NOT stored here — it's read from the repo-root
# `.credentials.local` (`langsmith_api_key=...`), seeded into LANGSMITH_API_KEY
# at startup. If that key is missing, tracing silently stays off.
# Turn this OFF before commercial launch (athlete health data → US SaaS).
langsmith_enabled = true
langsmith_project = "stride-coach-dev"
langsmith_endpoint = "https://api.smith.langchain.com"
langsmith_api_key_env = "LANGSMITH_API_KEY"
