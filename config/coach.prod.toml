# Coach LLM Configuration
#
# Three roles, each backed by an independent Azure OpenAI deployment on the
# word-learner-llm cognitive services resource. Auth is Managed Identity
# (ACA MI needs the `Cognitive Services OpenAI User` role on the resource).
#
# Cross-provider review (Claude Opus 4.7 as reviewer to defend against
# single-provider commitment bias — see plan §7.5) is a follow-up: until
# the Foundry Claude deployment is provisioned, reviewer reuses gpt-5.4
# with a much lower temperature + the adversarial reviewer prompt. The
# prompt difference + temperature=0 still catches a useful fraction of
# generator bugs even on the same model.

[generator]
# Coach Agent — generates weekly + master plans, drives chat with tools
provider     = "azure-openai"
model        = "gpt-5.4"
deployment   = "gpt-5.4"
endpoint     = "https://word-learner-llm.cognitiveservices.azure.com"
api_version  = "2025-04-01-preview"
api_kind     = "responses"
temperature  = 0.4
# max_tokens=131072 (128k) — the phase-at-once generator emits an entire
# phase's weeks in one LLM call. 128k matches the gpt-5 family's actual
# visible-output cap, and a phase of aspirational (spec=null) weeks stays
# comfortably under it (the 512k experiment only consumed a fraction).
# Capping at the real ceiling trims per-call latency without risking
# truncation. If a phase ever does truncate, the Azure deployment's
# max_response_tokens needs to be raised in the portal (NOT this config).
max_tokens   = 131072
# timeout_s=300 — S1 master plan with reasoning_effort=medium and
# 128k output budget can take 2-4 min for 22-week plans. 5 min cap.
timeout_s    = 300

[reviewer]
# Reviewer Agent — temporarily on gpt-5.4 (see header note). Swap to
# claude-opus-4-7 via Foundry serverless inference when the deployment is
# available; only the deployment / model / api_kind / endpoint / api_version
# fields need to change, no code edits required.
provider     = "azure-openai"
model        = "gpt-5.4"
deployment   = "gpt-5.4"
endpoint     = "https://word-learner-llm.cognitiveservices.azure.com"
api_version  = "2025-04-01-preview"
api_kind     = "responses"
temperature  = 0.0
max_tokens   = 4096
timeout_s    = 180

[commentary]
# Activity Commentary Agent — per-activity coach commentary, gpt-4.1 via
# the chat/completions API. Uses the existing AOAI API key in prod because
# this resource is in a different tenant than the Container App identity.
provider     = "azure-openai"
model        = "gpt-4.1"
deployment   = "gpt-4.1"
endpoint     = "https://word-learner-llm.cognitiveservices.azure.com"
api_version  = "2025-01-01-preview"
api_kind     = "chat-completions"
api_key_env  = "AZURE_OPENAI_API_KEY"
temperature  = 0.6
max_tokens   = 2048
timeout_s    = 90

[orchestrator]
# Orchestrator brain (Resolver / Supervisor / Aggregator / Memory Load+Writer)
# — the §4.7 low-latency lever: a cheap/fast classifier+planner for intent
# resolution and memory extraction, NOT deep reasoning. Without this section,
# for_role("orchestrator") falls back to [reviewer] (gpt-5.4): correct, but
# needlessly slow + expensive for every Resolver call and memory write.
#
# gpt-4.1 is the cheapest model CONFIRMED deployed + reachable on this prod
# resource (the [commentary] role already runs on it). Non-reasoning, fast,
# supports structured output via chat-completions. Auth mirrors [commentary]:
# the AOAI API key, because gpt-4.1 here sits in a different tenant than the
# ACA managed identity (gpt-5.4 generator/reviewer use MI; gpt-4.1 uses the
# key). If a gpt-4.1-mini / gpt-5.4-nano deployment is ever added to
# word-learner-llm, switch model/deployment/api_kind here (one block) for an
# even cheaper brain — no code change needed.
provider     = "azure-openai"
model        = "gpt-4.1"
deployment   = "gpt-4.1"
endpoint     = "https://word-learner-llm.cognitiveservices.azure.com"
api_version  = "2025-01-01-preview"
api_kind     = "chat-completions"
api_key_env  = "AZURE_OPENAI_API_KEY"
temperature  = 0.0
max_tokens   = 2048
timeout_s    = 60

[auth]
# Managed Identity is the only supported auth mode for prod. For local dev
# / unit tests, inject a fake LLM via coach_runtime.set_*_for_tests instead
# of switching to api-key auth.
mode = "managed-identity"

[observability]
# LangSmith tracing — ENABLED for the test phase (the coach is not yet
# commercialised). Coach turns export span traces to LangSmith for debugging.
#
# IMPORTANT — prod key wiring: `.credentials.local` is git-ignored and does NOT
# exist in the container, so the key must be provided as the LANGSMITH_API_KEY
# environment variable (Key Vault secret → container app setting), exactly like
# AZURE_OPENAI_API_KEY. If LANGSMITH_API_KEY is unset in the container, tracing
# safely stays OFF (configure_langsmith logs a warning, never fails the turn).
#
# TURN OFF (langsmith_enabled = false) BEFORE COMMERCIAL LAUNCH: the coach's
# prompts/responses carry sensitive athlete health data, and LangSmith SaaS is a
# US third-party processor — a PIPL cross-border-transfer liability. Test only.
langsmith_enabled  = true
langsmith_project  = "stride-coach-prod"
langsmith_endpoint = "https://api.smith.langchain.com"
langsmith_api_key_env = "LANGSMITH_API_KEY"
