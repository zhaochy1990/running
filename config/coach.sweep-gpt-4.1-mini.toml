# Coach LLM Configuration — LOCAL DEV
#
# Points the coach runtime at the developer-shared Azure AI Foundry resource
# (`azureai4identity`) instead of the production `word-learner-llm` resource.
# Auth is Azure CLI credential: `DefaultAzureCredential` walks through
# Environment > Workload Identity > Managed Identity > Azure CLI > Visual Studio
# > etc. — `az login` is what makes this work on a developer machine.
#
# Prod settings live in `config/coach.prod.toml`. The loader (see
# `src/coach/runtime/config.py`) resolves in this order:
#   1. `load_config(path=...)` arg
#   2. `STRIDE_COACH_CONFIG_PATH` env var
#   3. `<repo-root>/config/coach.local.toml` ← this file (developer default)
#   4. `<repo-root>/config/coach.toml`        (prod; only present after the
#                                              Docker build copies it from
#                                              `coach.prod.toml`)
#   5. `<cwd>/config/coach.toml`              (ad-hoc fallback for tests)

[generator]
# Coach Agent — generates weekly + master plans, drives chat with tools
provider     = "azure-openai"
model        = "gpt-4.1-mini"
deployment   = "gpt-4.1-mini"
endpoint     = "https://azureai4identity.cognitiveservices.azure.com"
api_version  = "2025-04-01-preview"
api_kind     = "chat-completions"
temperature  = 0.4


# ── Alternative generator models — verified reachable 2026-06-16 on the
#    AzureAIforSubstrateIdentity resource. ALL use the SAME provider / endpoint /
#    api_version as the active [generator] above:
#        provider    = "azure-openai"
#        endpoint    = "https://azureai4identity.cognitiveservices.azure.com"
#        api_version = "2025-04-01-preview"
#    To switch: replace the model / deployment / api_kind (and temperature) lines
#    above with ONE block below. Reasoning models (gpt-5.x, DeepSeek-R1) reject
#    `temperature` — leave it unset; chat models accept it.
#    NOTE: DeepSeek-R1 / Kimi-K2.5 are reachable via the AOAI chat-completions
#    path on the SAME cognitiveservices endpoint (they're AOAI deployments) —
#    NOT via services.ai.azure.com (that path 404s here).
#
# gpt-5.4 (reasoning):
#   model = "gpt-5.4"        ; deployment = "gpt-5.4"        ; api_kind = "responses"
# gpt-5.4-nano (reasoning, fastest gpt-5):
#   model = "gpt-5.4-nano"   ; deployment = "gpt-5.4-nano"   ; api_kind = "responses"
# gpt-4.1 (non-reasoning):
#   model = "gpt-4.1"        ; deployment = "gpt-4.1"        ; api_kind = "chat-completions" ; temperature = 0.4
# gpt-4.1-mini (non-reasoning, fast):
#   model = "gpt-4.1-mini"   ; deployment = "gpt-4.1-mini"   ; api_kind = "chat-completions" ; temperature = 0.4
# DeepSeek-R1 (reasoning, emits <think>):
#   model = "DeepSeek-R1"    ; deployment = "DeepSeek-R1"    ; api_kind = "chat-completions"
# Kimi-K2.5:
#   model = "Kimi-K2.5"      ; deployment = "Kimi-K2.5"      ; api_kind = "chat-completions" ; temperature = 0.6

# temperature intentionally NOT set — gpt-5.5 is a reasoning model that
# rejects the parameter (400 "Unsupported parameter"). llm_factory skips
# the kwarg when ModelSpec.temperature is None. Re-add this line only if
# you point the role at a non-reasoning model.
# max_tokens=131072 (128k) — the phase-at-once generator emits an entire
# phase's weeks in one LLM call. 128k matches the gpt-5 family's actual
# visible-output cap, and a phase of aspirational (spec=null) weeks (≤6
# weeks of sessions) stays comfortably under it — the 512k experiment only
# ever consumed a fraction. Capping at the real ceiling trims per-call
# latency (the model won't budget reasoning/output for headroom it can't
# use) without risking truncation. If a phase ever does truncate, the
# bottleneck is the Azure deployment's max_response_tokens (set at
# deployment create time, NOT this config) — raise it in the Azure portal.
max_tokens   = 16384
# reasoning_effort intentionally NOT set — defaults to model's medium,
# which is what S1 strategic reasoning (phase ordering, goal realism,
# injury safety, distance specificity) needs. Lowering it to "low" or
# "minimal" trades depth for budget; only flip this if you have evidence
# the output is consistently truncating at max_tokens.
# timeout_s=300 — at default reasoning_effort=medium and the new 131072
# token ceiling, the model can spend a lot of compute on reasoning for
# longer S1 plans (22-week dingchentao etc). 120s was too tight; 5 min
# accommodates the reasoning latency without hanging callers indefinitely.
timeout_s    = 300

[reviewer]
# Reviewer Agent — same model for now (no separate Claude Opus deployment on
# this resource yet); temperature dropped to 0 + reviewer prompt still surfaces
# a useful fraction of generator bugs.
provider     = "azure-openai"
model        = "gpt-5.5"
deployment   = "gpt-5.5"
endpoint     = "https://azureai4identity.cognitiveservices.azure.com"
api_version  = "2025-04-01-preview"
api_kind     = "responses"
# temperature omitted — gpt-5.5 reasoning model rejects it (see [generator]).
max_tokens   = 4096
timeout_s    = 180

[commentary]
# Activity Commentary Agent — forward-looking stub (production commentary
# path still uses its own direct AOAI client). Pointed at the same dev
# deployment so a future migration test can exercise it without touching
# prod config.
provider     = "azure-openai"
model        = "gpt-5.5"
deployment   = "gpt-5.5"
endpoint     = "https://azureai4identity.cognitiveservices.azure.com"
api_version  = "2025-04-01-preview"
api_kind     = "responses"
# temperature omitted — gpt-5.5 reasoning model rejects it (see [generator]).
max_tokens   = 2048
timeout_s    = 90

[auth]
# DefaultAzureCredential — picks up Azure CLI token after `az login`.
# Same enum value as prod (managed-identity) because the credential chain is
# the same code path; the runtime just uses whichever credential source the
# chain finds first.
mode = "managed-identity"
