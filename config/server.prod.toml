# NOTE: LLM / commentary configuration intentionally lives in
# `config/coach.{toml,prod.toml}` (loaded via `coach.runtime.config`).
# All LLM calls in the runtime go through
# `stride_server.coach_runtime.get_*_llm()` which reads coach.toml, NOT
# this file. Earlier `[llm]` / `[commentary]` blocks here were dead config
# from the pre-PR-#16 `aoai_client` path and were removed.

[storage.content]
account_url = "https://authstorage2026.blob.core.windows.net/"
container = "stride-data"
prefix = "users"

[storage.likes]
table_account_url = "https://authstorage2026.table.core.windows.net/"

[storage.master_plan]
table_account_url = "https://authstorage2026.table.core.windows.net/"

[storage.weekly_plan]
table_account_url = "https://authstorage2026.table.core.windows.net/"

[storage.jobs]
queue_account_url = "https://authstorage2026.queue.core.windows.net/"
queue_name = "stridejobs"
poison_queue_name = "stridejobs-poison"
table_account_url = "https://authstorage2026.table.core.windows.net/"
jobs_table_name = "stridejobs"
# Onboarding full_sync is a 20-30 min serial pull (jobs=1). The base 300s
# visibility timeout expires mid-sync, so the queue re-delivers the job to a
# second worker (or an overlapping deploy revision) and the two executions
# write the same coros.db concurrently → "database is locked" → the job fails
# its retries. A long visibility timeout (heartbeat-renewed per activity) keeps
# a single execution leased for the whole sync so it is never re-delivered while
# still running.
visibility_timeout_s = 2400

[coach_persistence]
table_account_url = "https://authstorage2026.table.core.windows.net/"
blob_account_url = "https://authstorage2026.blob.core.windows.net/"
file_backend_dir = "data/_coach_dev"

[notifications]
table_account_url = "https://authstorage2026.table.core.windows.net/"
devices_table = "stridedevices"
prefs_table = "strideprefs"

[notifications.jpush]
app_key = "ab305c4addc8f9aa2b5efb4c"
