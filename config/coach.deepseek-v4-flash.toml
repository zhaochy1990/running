# Coach LLM Configuration — DeepSeek V4 Flash local test
#
# Official DeepSeek OpenAI-compatible base URL: https://api.deepseek.com
# Set the key locally before use:
#   export DEEPSEEK_API_KEY=...
# Run with:
#   STRIDE_COACH_CONFIG_PATH=config/coach.deepseek-v4-flash.toml <command>

[models.deepseekv4flash]
provider = "openai-compatible"
model = "deepseek-v4-flash"
deployment = "deepseek-v4-flash"
endpoint = "https://api.deepseek.com"
api_key_env = "DEEPSEEK_API_KEY"
auth = "api-key"
api_kind = "chat-completions"
max_tokens = 4096
timeout_s = 120
reasoning_effort = "high"

[models.deepseekv4flash.extra]
thinking = { type = "enabled" }

[models.deepseekv4flash.generator]
max_tokens = 65536
timeout_s = 600
reasoning_effort = "max"

[models.deepseekv4flash.generator.extra]
# Enable only for roles/calls that require raw JSON object output.
# response_format = { type = "json_object" }

[models.deepseekv4flash.reviewer]
max_tokens = 8192
timeout_s = 300

[models.deepseekv4flash.commentary]
max_tokens = 2048
timeout_s = 120

[models.deepseekv4flash.orchestrator]
max_tokens = 4096
timeout_s = 120

[models.deepseekv4flash.orchestrator.extra]
# For a lower-latency non-thinking orchestrator experiment, change this to
# thinking = { type = "disabled" } and then add temperature = 0.0 here.

[generator]
model = "deepseekv4flash"

[reviewer]
model = "deepseekv4flash"

[commentary]
model = "deepseekv4flash"

[orchestrator]
model = "deepseekv4flash"

[observability]
langsmith_enabled = true
langsmith_project = "stride-coach-deepseek-v4-flash"
langsmith_endpoint = "https://api.smith.langchain.com"
langsmith_api_key_env = "LANGSMITH_API_KEY"
